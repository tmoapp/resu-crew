<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Resu.Crew</title>
  <meta name="theme-color" content="#07090F" media="(prefers-color-scheme: light)"/>
  <meta name="theme-color" content="#07090F" media="(prefers-color-scheme: dark)"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="Resu.Crew"/>
  <link rel="manifest" id="rc-manifest"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090F;--bg2:rgba(8,12,22,0.82);--bg3:rgba(12,16,30,0.88);--bg4:rgba(20,27,50,0.95);
  --accent:#2A7FE8;--accent2:#5BA3FF;--accent3:#B8D4FF;
  --gold:#F4A261;--gold2:#FDDCB0;
  --white:#EEF2FF;--muted:#6B7699;--muted2:#9BA5CC;
  --green:#27AE60;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --glow:rgba(42,127,232,0.25);
}
html{
  height:100%;height:-webkit-fill-available;
}
body{
  font-family:'Outfit',sans-serif;color:var(--white);
  width:100%;margin:0;
  min-height:100vh;
  min-height:-webkit-fill-available;
  overflow-x:hidden;
  background:#07090F;
}



body{
  background:var(--bg);
  background-image:url('https://images.unsplash.com/photo-1534430480872-3498386e7856?w=1200&q=80&fit=crop');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,rgba(4,6,14,0.88) 0%,rgba(7,9,20,0.82) 50%,rgba(3,5,12,0.90) 100%);
  z-index:0;
  pointer-events:none;
}


.screen{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}.screen.active{display:flex}

/* ── LOGIN ── */
#s-login{align-items:center;justify-content:center;padding:1.5rem;flex:1;}
#s-register{overflow-y:auto !important;-webkit-overflow-scrolling:touch;}



.login-glow{display:none}
.login-card{width:100%;max-width:380px;position:relative;z-index:2;background:rgba(4,6,16,0.88);border:1px solid rgba(42,127,232,0.3);border-radius:20px;padding:2rem 1.75rem;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 8px 60px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.04)}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:3.2rem;letter-spacing:.08em;color:var(--accent);line-height:1;text-align:center;text-shadow:0 0 40px rgba(42,127,232,0.4)}
.brand-tag{font-size:1.1rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin:.4rem 0 1.8rem;text-align:center}
.role-pills{display:flex;gap:6px;margin-bottom:1.6rem;background:rgba(0,0,0,0.3);border-radius:6px;padding:4px;border:1px solid var(--border)}
.rp{flex:1;padding:.48rem;border-radius:4px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:500;transition:.2s}
.rp.on{background:var(--accent);color:white}
.field{margin-bottom:.85rem}
.field label{display:block;font-size:1.05rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.38rem}
.inp{display:block;width:100%;padding:.85rem 1rem;border-radius:6px;border:1px solid var(--border2);background:rgba(0,0,0,0.35);color:var(--white);font-family:'Outfit',sans-serif;font-size:1.05rem;outline:none;transition:.2s;backdrop-filter:blur(4px)}
.inp::placeholder{color:var(--muted)}.inp:focus{border-color:var(--accent);background:rgba(42,127,232,0.08)}
select.inp option{background:#0d1120}textarea.inp{resize:vertical;min-height:80px}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:.78rem;border-radius:6px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;background:var(--accent);color:white;transition:.2s;margin-top:.5rem;box-shadow:0 4px 20px rgba(42,127,232,0.3)}
.btn-primary:hover{background:#1A6DD4;box-shadow:0 4px 25px rgba(42,127,232,0.45)}.btn-primary:active{transform:scale(0.98)}
.btn-ghost{background:none;border:1px solid var(--border2);color:var(--muted2);border-radius:6px;padding:.5rem 1rem;cursor:pointer;font-family:'Outfit',sans-serif;font-size:1.05rem;transition:.2s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.link{background:none;border:none;color:var(--accent);cursor:pointer;font-family:'Outfit',sans-serif;font-size:1.1rem;text-decoration:underline;text-underline-offset:3px}

/* ── APP SHELL ── */
.app-shell{display:flex;flex-direction:column;flex:1;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.1rem;background:rgba(4,6,14,0.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(42,127,232,0.12);position:sticky;top:0;z-index:100;flex-shrink:0}
.topbar-logo{font-family:Bebas Neue,sans-serif;font-size:1.4rem;letter-spacing:.06em;color:var(--accent);text-shadow:0 0 16px rgba(42,127,232,0.4)}
.topbar-right{display:flex;align-items:center;gap:.75rem}
.topbar-name{font-size:1rem;color:var(--muted);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.av{width:34px;height:34px;border-radius:50%;background:rgba(42,127,232,0.15);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:600;color:var(--accent);cursor:pointer;flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.page{flex:1;overflow-y:auto;padding:1rem;padding-bottom:calc(5.5rem + env(safe-area-inset-bottom, 0px));background:transparent}
.page::-webkit-scrollbar{width:3px}.page::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
.bnav{background:var(--bg2);border-top:1px solid rgba(42,127,232,0.1);display:flex;justify-content:space-around;padding:.4rem 0 calc(.6rem + env(safe-area-inset-bottom, 0px));flex-shrink:0;position:fixed;bottom:0;left:0;right:0;z-index:80;backdrop-filter:blur(20px)}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:.45rem .4rem;border:none;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.65rem;font-weight:6;letter-spacing:.04em;text-transform:uppercase;min-width:56px;transition:color .15s00;cursor:pointer;transition:.2s;text-transform:uppercase;min-width:56px}
.nb svg{width:20px;height:20px}.nb.on{color:var(--accent);font-weight:600}
.nb:active svg{transform:scale(.88)}.nb.on svg{filter:drop-shadow(0 0 6px rgba(42,127,232,0.6))}

/* ── CARDS & UI ── */
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.sec-h h2{font-family:Bebas Neue,sans-serif;font-size:1.5rem;letter-spacing:.06em;color:var(--white)}
.btn-add{display:flex;align-items:center;gap:.3rem;padding:.38rem .8rem;border-radius:5px;border:1px solid var(--accent);background:rgba(42,127,232,0.1);color:var(--accent);cursor:pointer;font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:500;transition:.2s}
.btn-add:hover{background:var(--accent);color:white}.btn-add svg{width:14px;height:14px}
.card{background:rgba(8,12,22,0.75);border:1px solid rgba(42,127,232,0.12);border-radius:12px;padding:1.1rem;margin-bottom:.85rem;transition:.2s;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.card:hover{border-color:var(--border2)}.card.clickable{cursor:pointer}
.card.clickable:hover{border-color:rgba(42,127,232,0.3);background:var(--bg3)}
.card-title{font-size:1.08rem;font-weight:600;color:var(--white);margin-bottom:.2rem}
.card-sub{font-size:.87rem;color:var(--muted2)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:1.05rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.bg-green{background:rgba(39,174,96,0.15);color:#27AE60;border:1px solid rgba(39,174,96,0.2)}
.bg-red{background:rgba(220,50,50,0.15);color:#E05555;border:1px solid rgba(220,50,50,0.2)}
.bg-gold{background:rgba(244,162,97,0.15);color:var(--gold);border:1px solid rgba(244,162,97,0.2)}
.bg-blue{background:rgba(42,127,232,0.15);color:var(--accent2);border:1px solid rgba(42,127,232,0.2)}
.bg-purple{background:rgba(142,68,173,0.15);color:#A569BD;border:1px solid rgba(142,68,173,0.2)}
.bg-muted{background:rgba(255,255,255,0.06);color:var(--muted2);border:1px solid var(--border)}
.divider{height:1px;background:var(--border);margin:.75rem 0}
.pbar{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;margin-top:.5rem}
.pfill{height:100%;background:var(--accent);border-radius:2px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.85rem;text-align:center;backdrop-filter:blur(12px)}
.stat-n{font-family:Bebas Neue,sans-serif;font-size:2rem;color:var(--accent);line-height:1}
.stat-l{font-size:1.05rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:.2rem}

/* ── FEED ── */
.post-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:.9rem;overflow:hidden;backdrop-filter:blur(12px)}
.post-head{padding:.85rem 1rem;display:flex;align-items:center;justify-content:space-between}
.post-media{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer;background:#050810}
.post-img{width:100%;height:100%;object-fit:cover;display:block}
.play-ring{width:52px;height:52px;border-radius:50%;border:2px solid rgba(42,127,232,0.7);display:flex;align-items:center;justify-content:center;background:rgba(42,127,232,0.15);z-index:2}
.post-foot{padding:.85rem 1rem}
.post-actions{display:flex;align-items:center;gap:1.2rem;margin-top:.7rem}
.action-btn{display:flex;align-items:center;gap:.35rem;background:none;border:none;color:var(--muted2);cursor:pointer;font-family:'Outfit',sans-serif;font-size:1.05rem;padding:.5rem .7rem;border-radius:5px;transition:.2s}
.action-btn:hover{color:var(--white);background:rgba(255,255,255,0.05)}.action-btn.liked{color:var(--accent)}
.action-btn svg{width:16px;height:16px}
.comments-section{border-top:1px solid var(--border);padding:.75rem 1rem}
.comment-item{display:flex;gap:.6rem;margin-bottom:.6rem;align-items:flex-start}
.comment-body{flex:1;background:var(--bg3);border-radius:8px;padding:.5rem .75rem}
.comment-author{font-size:1rem;font-weight:600;color:var(--accent2);margin-bottom:.15rem}
.comment-text{font-size:1.1rem;color:var(--muted2);line-height:1.4}
.comment-input-wrap{display:flex;gap:.5rem;margin-top:.5rem}
.comment-input-wrap .inp{flex:1;padding:.5rem .75rem;font-size:1.1rem}
.btn-send{padding:.5rem .75rem;border-radius:5px;border:none;background:var(--accent);color:white;cursor:pointer;font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:600;flex-shrink:0}
.post-menu-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:.2rem .5rem;border-radius:4px;font-size:1.1rem;line-height:1}
.drop-menu{position:absolute;right:0;top:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:.3rem 0;z-index:200;min-width:140px;display:none;backdrop-filter:blur(16px)}
.drop-menu.open{display:block}
.drop-item{padding:.55rem 1rem;font-size:1.1rem;cursor:pointer;color:var(--muted2);transition:.15s;display:block;width:100%;text-align:left;background:none;border:none;font-family:'Outfit',sans-serif}
.drop-item:hover{background:rgba(255,255,255,0.05);color:var(--white)}.drop-item.danger{color:#E05555}
.drop-item.danger:hover{background:rgba(220,50,50,0.1)}

/* ── MEDIA TYPE SELECTOR ── */
.media-type-row{display:flex;gap:.5rem;margin-bottom:.8rem}
.mt-btn{flex:1;padding:.55rem;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:500;transition:.2s;display:flex;align-items:center;justify-content:center;gap:.4rem}
.mt-btn.on{border-color:var(--accent);background:rgba(42,127,232,0.1);color:var(--accent)}
.media-drop-zone{border:1px dashed rgba(42,127,232,0.3);border-radius:8px;padding:1.5rem;text-align:center;cursor:pointer;transition:.2s;margin-bottom:.6rem}
.media-drop-zone:hover{border-color:var(--accent);background:rgba(42,127,232,0.05)}
.media-preview{width:100%;border-radius:8px;max-height:160px;object-fit:cover;margin-bottom:.5rem;display:block}

/* ── PROFS CARDS ── */
.prof-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin-bottom:.8rem;backdrop-filter:blur(12px);transition:.2s}
.prof-card:hover{border-color:rgba(42,127,232,0.25)}
.prof-av{width:64px;height:64px;border-radius:50%;border:2px solid var(--accent);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:Bebas Neue,sans-serif;font-size:1.4rem;color:var(--accent);background:rgba(42,127,232,0.1)}
.prof-av img{width:100%;height:100%;object-fit:cover}
.prof-chip{display:inline-block;padding:2px 8px;border-radius:4px;background:rgba(42,127,232,0.12);border:1px solid rgba(42,127,232,0.2);color:var(--accent3);font-size:1.1rem;margin:.15rem .1rem;font-weight:500}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:980;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--bg3);border-radius:14px 14px 0 0;padding:1.5rem;width:100%;max-width:500px;border-top:1px solid rgba(42,127,232,0.2);max-height:90vh;overflow-y:auto;backdrop-filter:blur(20px)}
.modal::-webkit-scrollbar{width:3px}.modal::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
.modal-title{font-family:Bebas Neue,sans-serif;font-size:1.6rem;letter-spacing:.06em;color:var(--white);margin-bottom:1.2rem}
.modal-actions{display:flex;gap:.7rem;margin-top:1.2rem}.modal-actions .btn-primary{margin:0}
.btn-cancel{flex:1;padding:.75rem;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;font-size:1rem}
.row2{display:flex;gap:.7rem}.row2>div{flex:1}
.field-row{margin-bottom:.75rem}
.field-row label{display:block;font-size:1.05rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem}

/* ── PACK OPTIONS ── */
.pack-option{display:flex;align-items:center;justify-content:space-between;padding:.7rem .9rem;border:1px solid var(--border2);border-radius:7px;margin-bottom:.5rem;cursor:pointer;transition:.2s}
.pack-option:hover{border-color:var(--accent);background:rgba(42,127,232,0.05)}
.pack-option.selected{border-color:var(--accent);background:rgba(42,127,232,0.1)}
.pack-option-price{font-size:1.1rem;color:var(--gold);font-weight:600}

/* ── PROFILE OVERLAY ── */
#profile-ov{display:none;position:fixed;inset:0;z-index:950;overflow-y:auto;-webkit-overflow-scrolling:touch;flex-direction:column;background:rgba(7,9,15,0.97);backdrop-filter:blur(10px)}
#profile-ov.open{display:flex}
.profile-inner{min-height:100%;padding:1.2rem 1.2rem calc(1.2rem + env(safe-area-inset-bottom,0px));max-width:500px;margin:0 auto;width:100%}
.profile-back{display:flex;align-items:center;gap:.5rem;margin-bottom:1.2rem;padding-bottom:.8rem;border-bottom:1px solid var(--border)}
.profile-back button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:1.3rem;padding:0}
.profile-back span{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em;color:var(--muted2)}
.profile-av-big{width:80px;height:80px;border-radius:50%;border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);background:rgba(42,127,232,0.1);overflow:hidden;flex-shrink:0}
.profile-av-big img{width:100%;height:100%;object-fit:cover}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:1rem}
.info-label{font-size:1.1rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.delete-btn{padding:.4rem .9rem;border-radius:5px;border:1px solid rgba(220,50,50,0.3);background:rgba(220,50,50,0.08);color:#E05555;cursor:pointer;font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:500}

/* ── QR ── */
#qr-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;padding:1.2rem}
#qr-ov.open{display:flex}
.qr-frame{width:210px;height:210px;border-radius:12px;position:relative;overflow:hidden;background:#030508;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid rgba(42,127,232,0.4)}
.scan-line{position:absolute;left:12px;right:12px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:sc 2s ease-in-out infinite;border-radius:2px}
@keyframes sc{0%,100%{top:15%}50%{top:80%}}
.qr-corner{position:absolute;width:24px;height:24px;border-color:var(--accent);border-style:solid}
.qr-corner.tl{top:8px;left:8px;border-width:3px 0 0 3px}.qr-corner.tr{top:8px;right:8px;border-width:3px 3px 0 0}
.qr-corner.bl{bottom:8px;left:8px;border-width:0 0 3px 3px}.qr-corner.br{bottom:8px;right:8px;border-width:0 3px 3px 0}
.scanned-card{background:rgba(10,14,26,0.95);border:1px solid rgba(42,127,232,0.25);border-radius:12px;padding:1.4rem;width:100%;max-width:340px;backdrop-filter:blur(12px)}

/* ── MISC ── */
.pend-row{display:flex;align-items:center;justify-content:space-between;padding:.65rem 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.pend-actions{display:flex;gap:.4rem}
.btn-approve{padding:.3rem .7rem;border-radius:4px;border:1px solid rgba(39,174,96,0.3);background:rgba(39,174,96,0.12);color:#27AE60;cursor:pointer;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:600}
.btn-reject{padding:.3rem .7rem;border-radius:4px;border:1px solid rgba(220,50,50,0.3);background:rgba(220,50,50,0.12);color:#E05555;cursor:pointer;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:600}
.req-row{display:flex;align-items:start;justify-content:space-between;gap:.5rem;padding:.7rem 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.req-info{flex:1}.req-name{font-size:1rem;font-weight:600}.req-detail{font-size:1rem;color:var(--muted2);margin-top:.15rem;line-height:1.4}
.req-actions{display:flex;gap:.35rem;flex-shrink:0;margin-top:.2rem}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:.55rem 1.2rem;border-radius:20px;font-size:.85rem;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:normal;text-align:center;max-width:85vw;width:max-content;}
.toast.ok{background:rgba(39,174,96,0.92);border:1px solid rgba(168,230,195,0.3);color:#A8E6C3}
.toast.err{background:rgba(220,50,50,0.92);border:1px solid rgba(255,180,180,0.3);color:#FFB3B3}
.toast.info{background:rgba(42,127,232,0.92);border:1px solid rgba(184,212,255,0.3);color:#B8D4FF}
.toast.show{opacity:1}
.qr-display-wrap{display:flex;flex-direction:column;align-items:center;padding:1.5rem 0;text-align:center}
#student-qr-box{width:180px;height:180px;background:white;border-radius:10px;padding:8px;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center}

// ════════════════════════════════════════════════
// ⚙️  CONFIGURATION — Remplissez vos clés Supabase
// ════════════════════════════════════════════════
var SUPABASE_URL = 'https://yfkirciucifehzthoaqe.supabase.co'; // ex: https://xxxx.supabase.co
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlma2lyY2l1Y2lmZWh6dGhvYXFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzQyMzEsImV4cCI6MjA5MTUxMDIzMX0.idwJyAgfj92K8Icst9zGOOkwZfHgliJDEbkOkp6oCyw';     // clé anon/public de Settings > API

var sb = null;
var CURRENT_USER = null;
var CURRENT_PROFILE = null;
var SUPABASE_READY = false;

// Token stocké localement (pas de verrou)
var RC_TOKEN = localStorage.getItem('rc-token') || null;
var RC_REFRESH = localStorage.getItem('rc-refresh') || null;

// ── Nettoyage verrous ──
function clearSupabaseLocks() {
  try {
    Object.keys(localStorage).forEach(function(k){
      if(k.indexOf('lock') >= 0) localStorage.removeItem(k);
    });
    if(window.indexedDB) indexedDB.deleteDatabase('supabase-lock');
  } catch(e) {}
}

// ── Auth via fetch direct (sans verrou) ──
async function rcSignIn(email, password) {
  var r = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
    body: JSON.stringify({ email: email, password: password })
  });
  var d = await r.json();
  if (d.error || !d.access_token) return { error: d.error_description || d.error || 'Erreur connexion' };
  RC_TOKEN = d.access_token;
  RC_REFRESH = d.refresh_token;
  localStorage.setItem('rc-token', RC_TOKEN);
  localStorage.setItem('rc-refresh', RC_REFRESH);
  localStorage.setItem('rc-user-id', d.user.id);
  return { user: d.user };
}

async function rcSignOut() {
  if (RC_TOKEN) {
    await fetch(SUPABASE_URL + '/auth/v1/logout', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + RC_TOKEN, 'apikey': SUPABASE_KEY }
    }).catch(function(){});
  }
  RC_TOKEN = null; RC_REFRESH = null;
  localStorage.removeItem('rc-token');
  localStorage.removeItem('rc-refresh');
  localStorage.removeItem('rc-user-id');
}

async function rcSignUp(email, password, meta) {
  var r = await fetch(SUPABASE_URL + '/auth/v1/signup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
    body: JSON.stringify({ email: email, password: password, data: meta || {} })
  });
  var d = await r.json();
  if (d.error || (!d.id && !d.user)) return { error: d.error_description || d.msg || d.error || 'Erreur inscription' };
  return { user: d.user || d };
}

// ── Init client Supabase (DB uniquement, pas d'auth) ──
function initSupabase() {
  if (SUPABASE_URL === 'VOTRE_URL_SUPABASE' || SUPABASE_KEY === 'VOTRE_ANON_KEY') {
    console.warn('[RC] Supabase non configuré — mode démo actif');
    return false;
  }
  try {
    var opts = {
      auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }
    };
    if (RC_TOKEN) {
      opts.global = { headers: { 'Authorization': 'Bearer ' + RC_TOKEN } };
    }
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, opts);
    console.log('[RC] Supabase connecté');
    return true;
  } catch(e) {
    console.error('[RC] Erreur Supabase:', e);
    return false;
  }
}

function reinitSbWithToken() {
  if (!SUPABASE_READY || !RC_TOKEN) return;
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    global: { headers: { 'Authorization': 'Bearer ' + RC_TOKEN } },
    auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }
  });
}

// ── Récupère le meilleur token disponible ──
function getBestToken() {
  return RC_TOKEN || SUPABASE_KEY;
}

// ── CRUD helpers ──
async function sbLoad(table, query) {
  if (!SUPABASE_READY) return null;
  var { data, error } = await sb.from(table).select(query || '*');
  if (error) { console.error(table, error); return null; }
  return data;
}

async function sbInsert(table, row) {
  if (!SUPABASE_READY) return null;
  var { data, error } = await sb.from(table).insert(row).select().single();
  if (error) { toast(error.message, 'err'); return null; }
  return data;
}

async function sbUpdate(table, id, row) {
  if (!SUPABASE_READY) return null;
  var { data, error } = await sb.from(table).update(row).eq('id', id).select().single();
  if (error) { toast(error.message, 'err'); return null; }
  return data;
}

async function sbDelete(table, id) {
  if (!SUPABASE_READY) return false;
  var { error } = await sb.from(table).delete().eq('id', id);
  if (error) { toast(error.message, 'err'); return false; }
  return true;
}

async function sbUploadPhoto(bucket, file, path) {
  if (!SUPABASE_READY) return null;
  var { data, error } = await sb.storage.from(bucket).upload(path, file, { upsert: true });
  if (error) { toast('Erreur upload: ' + error.message, 'err'); return null; }
  var { data: url } = sb.storage.from(bucket).getPublicUrl(path);
  return url.publicUrl;
}

// ── DOMContentLoaded ──
document.addEventListener('DOMContentLoaded', async function() {
  clearSupabaseLocks();
  SUPABASE_READY = initSupabase();
  // Pré-remplir email mémorisé
  var savedEmail = localStorage.getItem('rc-email') || '';
  var emailEl = document.getElementById('l-email');
  if (emailEl && savedEmail) emailEl.value = savedEmail;
  if (!SUPABASE_READY) return;
  // Restaurer session depuis RC_TOKEN stocké
  var userId = localStorage.getItem('rc-user-id');
  if (RC_TOKEN && userId) {
    try {
      reinitSbWithToken();
      var { data: prof, error: pErr } = await sb.from('profiles').select('*').eq('id', userId).single();
      if (!pErr && prof && prof.statut === 'actif') {
        CURRENT_PROFILE = prof; ROLE = prof.role; CURRENT_USER = { id: userId };
        await loadFromSupabase();
        if (ROLE === 'prof') {
          updTeacherTopbar(); goTo('s-teacher'); tPage('feed');
        } else {
          var { data: ins } = await sb.from('inscriptions').select('*').eq('eleve_id', userId);
          CURRENT_PROFILE.inscriptions = (ins || []).map(function(i) {
            return { courseId: i.cours_id, packId: i.pack_id, type: i.type, restant: i.seances_restantes, total: i.seances_total, assiste: i.seances_assistees || 0, paye: parseFloat(i.montant_paye || 0) };
          });
          CURRENT_PROFILE.montant = (CURRENT_PROFILE.inscriptions || []).reduce(function(a, i) { return a + i.paye; }, 0);
          CURRENT_PROFILE.st = 'Actif'; CURRENT_PROFILE.photo = prof.photo_url || null;
          STUDENTS[0] = CURRENT_PROFILE;
          updTopbar(); goTo('s-student'); sPage('feed');
        }
      }
    } catch(e) { console.warn('[RC] Session restore:', e); }
  }
});

// ── Realtime ──
function sbSubscribeFeed(callback) {
  if (!SUPABASE_READY) return;
  sb.channel('feed')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, callback)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'likes' }, callback)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'commentaires' }, callback)
    .subscribe();
}
</script>

async function loadFromSupabase(){
  if(!SUPABASE_READY) return;
  try{
    var [profs,cours,packs,styles,posts]=await Promise.all([
      sb.from('profs').select('*').order('created_at'),
      sb.from('cours').select('*').order('created_at'),
      sb.from('packs').select('*').order('created_at'),
      sb.from('styles').select('*').order('nom'),
      sb.from('posts').select('*').order('created_at',{ascending:false}).limit(30),
    ]);
    if(profs.data) PROFS=profs.data.map(function(p){return{id:p.id,prenom:p.prenom,nom:p.nom,photo:p.photo_url,styles:p.styles||[],desc:p.description||''};});
    if(cours.data) COURSES=cours.data.map(function(c){return{id:c.id,nom:c.nom,style:c.style,profId:c.prof_id,jour:c.jour,heure:c.heure?c.heure.substring(0,5):c.heure,duree:c.duree_min,places:c.places_max,inscrits:0,niveau:c.niveau,packs:c.packs_ids||[],tarif_seance:c.tarif_seance||null};});
    // Compter les inscrits réels par cours (reset d'abord)
    COURSES.forEach(function(co){co.inscrits=0;});
    var {data:insData}=await sb.from('inscriptions').select('cours_id');
    if(insData){
      insData.forEach(function(ins){
        var co=COURSES.find(function(x){return x.id===ins.cours_id;});
        if(co) co.inscrits=(co.inscrits||0)+1;
      });
    }
    if(packs.data) PACKS=packs.data.map(function(p){return{id:p.id,nom:p.nom,type:p.type,seances:p.nb_seances,prix:parseFloat(p.prix)};});
    if(styles.data) DANCE_STYLES=styles.data.map(function(s){return s.nom;});
    if(posts.data) POSTS=posts.data.map(function(p){
      var initials=((p.author_name||'').split(' ').map(function(w){return(w[0]||'').toUpperCase();}).join(''))||'?';
      return{id:p.id,author:p.author_name||'Prof',authorInit:initials,date:new Date(p.created_at).toLocaleDateString('fr'),titre:p.titre,desc:p.description||'',mediaType:p.media_type||'video',mediaSrc:p.media_url,bg:'#040810',em:'📸',likes:p.likes_count||0,likedBy:[],comments:[],showComments:false};
    });
    if(CURRENT_PROFILE&&CURRENT_PROFILE.role==='prof'){
      var eleves=await sb.from('profiles').select('*').eq('role','eleve').order('created_at');
      if(eleves.data){
        STUDENTS=eleves.data.filter(function(e){return e.statut==='actif';}).map(function(e){
          return{id:e.id,nom:e.nom,prenom:e.prenom,email:e.email,tel:e.tel||'',dob:e.dob||'',niveau:e.niveau||'Débutant',photo:e.photo_url,inscriptions:[],st:'Actif',montant:0};
        });
        for(var si=0;si<STUDENTS.length;si++){
          var {data:sins}=await sb.from('inscriptions').select('*').eq('eleve_id',STUDENTS[si].id);
          STUDENTS[si].inscriptions=(sins||[]).map(function(i){return{courseId:i.cours_id,packId:i.pack_id,type:i.type,restant:i.seances_restantes,total:i.seances_total,assiste:i.seances_assistees||0,paye:parseFloat(i.montant_paye||0)};});
          STUDENTS[si].montant=STUDENTS[si].inscriptions.reduce(function(a,i){return a+i.paye;},0);
        }
        PENDING_ACCOUNTS=[];
        var pending=eleves.data.filter(function(e){return e.statut==='attente';});
        pending.forEach(function(e){
          PENDING_ACCOUNTS.push({dbId:e.id,isProfile:true,nom:e.nom||'',prenom:e.prenom||'',email:e.email,tel:e.tel||'',dob:e.dob||'',niveau:e.niveau||'Débutant',photo:e.photo_url});
        });
        var demandesIns=await sb.from('demandes_inscription').select('*').eq('statut','attente').order('created_at');
        if(demandesIns.data) INSCRIPTION_REQUESTS=demandesIns.data.map(function(d){
          return{id:d.id,studentId:d.eleve_id,courseId:d.cours_id,packId:d.pack_id,date:new Date(d.created_at).toLocaleDateString('fr'),msg:d.message||''};
        });
        // Charger les réservations séance unique
        var resaData=await sb.from('reservations_seance').select('*').in('statut',['attente','confirme']).order('created_at');
        if(resaData.data) RESERVATIONS_SEANCE=resaData.data;
      }
    }
    // Charger les séances (pour élèves et profs)
    var todayStr2=new Date().toISOString().split('T')[0];
    var futurStr2=new Date(Date.now()+120*24*60*60*1000).toISOString().split('T')[0];
    var {data:seancesData}=await sb.from('seances').select('*')
      .gte('date',todayStr2).lte('date',futurStr2).order('date');
    if(seancesData) SEANCES=seancesData;
    // Charger les réservations de l'élève connecté
    if(CURRENT_PROFILE&&CURRENT_PROFILE.role==='eleve'&&CURRENT_USER){
      // Charger toutes les réservations sauf les annulées (pas refusées - on les garde pour affichage)
      var {data:resaEleve}=await sb.from('reservations_seance').select('*')
        .eq('eleve_id',CURRENT_USER.id)
        .neq('statut','annule')
        .order('date');
      if(resaEleve) RESERVATIONS_SEANCE=resaEleve;
    }
    console.log('[RC] Données chargées depuis Supabase');
  }catch(e){
    console.error('[RC] Erreur chargement:',e);
  }
}

function setRole(r){
  ROLE=r;
  // Restaurer l'email sauvegardé pour ce rôle
  var emailEl=document.getElementById('l-email');
  var saved=localStorage.getItem('rc-email-'+r)||'';
  if(emailEl&&saved) emailEl.value=saved;
}
async function doLogin(){
  var emailEl=document.getElementById('l-email');
  var pwEl=document.getElementById('l-pw');
  if(!emailEl||!pwEl){toast('Erreur formulaire','err');return;}
  var email=emailEl.value.trim();
  var pw=pwEl.value;
  if(!email||!pw){toast('Email et mot de passe requis','err');return;}
  if(!SUPABASE_READY){
    if(ROLE==='prof'){goTo('s-teacher');tPage('feed');}
    else{LOGGED_STUDENT=0;updTopbar();goTo('s-student');sPage('feed');}
    return;
  }
  toast('Connexion...','info');
  try{
    // Connexion via fetch direct — pas de verrou, sauvegarde RC_TOKEN
    var res=await rcSignIn(email,pw);
    if(res.error){toast(res.error,'err');return;}
    // RC_TOKEN est maintenant sauvegardé par rcSignIn
    // Réinitialiser le client Supabase avec le token
    reinitSbWithToken();
    CURRENT_USER=res.user;
    // Charger le profil
    var {data:prof,error:profErr}=await sb.from('profiles').select('*').eq('id',res.user.id).single();
    if(profErr||!prof){toast('Profil introuvable — contactez le prof','err');return;}
    if(prof.statut==='attente'){toast('Compte en attente de validation par le professeur','err');return;}
    CURRENT_PROFILE=prof;
    ROLE=prof.role;
    localStorage.setItem('rc-email',email);
    await loadFromSupabase();
    if(ROLE==='prof'){
      updTeacherTopbar();goTo('s-teacher');tPage('feed');
    }else{
      var {data:ins}=await sb.from('inscriptions').select('*').eq('eleve_id',res.user.id);
      CURRENT_PROFILE.inscriptions=(ins||[]).map(function(i){return{courseId:i.cours_id,packId:i.pack_id,type:i.type,restant:i.seances_restantes,total:i.seances_total,assiste:i.seances_assistees||0,paye:parseFloat(i.montant_paye||0)};});
      CURRENT_PROFILE.montant=(CURRENT_PROFILE.inscriptions||[]).reduce(function(a,i){return a+i.paye;},0);
      CURRENT_PROFILE.st='Actif';CURRENT_PROFILE.photo=prof.photo_url||null;
      STUDENTS[0]=CURRENT_PROFILE;
      updTopbar();goTo('s-student');sPage('feed');
    }
  }catch(e){
    console.error('[RC] Login error:',e);
    toast('Erreur: '+e.message,'err');
  }
}

async function submitRegister(){
  var pn=document.getElementById('r-pn').value.trim(),nm=document.getElementById('r-nm').value.trim();
  if(!pn||!nm){toast('Prénom et nom requis','err');return;}
  var email=document.getElementById('r-em').value.trim();
  var pw=document.getElementById('r-pw').value;
  if(!email){toast('Email requis','err');return;}
  if(!pw||pw.length<6){toast('Mot de passe requis (6 caractères min)','err');return;}
  var tel=document.getElementById('r-tel').value;
  var dob=document.getElementById('r-dob').value;
  var niveau=document.getElementById('r-niv').value;

  function showWaiting(){
    goTo('s-login');
    var notice=document.getElementById('login-notice');
    if(notice){
      notice.style.display='block';
      notice.textContent='Votre compte est en attente de validation par le professeur. Vous pourrez vous connecter dès validation.';
    }
    toast('Inscription envoyée ! En attente de validation.','info');
  }

  if(SUPABASE_READY){
    // 1. Créer le compte Auth
    var res=await rcSignUp(email,pw,{prenom:pn,nom:nm,tel:tel,niveau:niveau});
    if(res.error){toast('Erreur: '+res.error,'err');return;}
    var newUser=res.user;
    if(newUser&&newUser.id){
      // 2. Forcer role=eleve, statut=attente dans profiles
      await sb.from('profiles').upsert({
        id:newUser.id,role:'eleve',
        prenom:pn,nom:nm,email:email,
        tel:tel,dob:dob||null,niveau:niveau,statut:'attente'
      });
      // 3. Insérer dans demandes_compte via fetch direct (contourne RLS)
      await fetch(SUPABASE_URL+'/rest/v1/demandes_compte',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'apikey':SUPABASE_KEY,
          'Authorization':'Bearer '+SUPABASE_KEY,
          'Prefer':'return=minimal'
        },
        body:JSON.stringify({
          prenom:pn,nom:nm,email:email,
          tel:tel||null,dob:dob||null,
          niveau:niveau,statut:'attente'
        })
      });
    }
    showWaiting();
  } else {
    PENDING_ACCOUNTS.push({nom:nm,prenom:pn,email:email,tel:tel,dob:dob,niveau:niveau,photo:null});
    showWaiting();
  }
}
function pickProfilePhoto(){
  var inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*'; inp.style.display='none';
  inp.onchange=function(){
    var file=inp.files[0]; if(!file) return;
    var reader=new FileReader();
    reader.onload=function(e){
      var zone=document.getElementById('es-photo-zone');
      if(zone) zone.innerHTML='<img src="'+e.target.result+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>';
      var d=document.getElementById('es-photo-data');
      if(d) d.value=e.target.result;
      toast('Photo sélectionnée ✓');
    };
    reader.readAsDataURL(file);
    document.body.removeChild(inp);
  };
  document.body.appendChild(inp); inp.click();
}

async function approveIns(reqId){
  var req=INSCRIPTION_REQUESTS.find(function(r){return r.id===reqId});
  if(!req) return;
  var s=getStudent(req.studentId);
  var pk=getPack(req.packId);
  if(SUPABASE_READY){
    var tok=RC_TOKEN||localStorage.getItem('rc-token')||SUPABASE_KEY;
    if(pk){
      var insRow={eleve_id:req.studentId,cours_id:req.courseId,pack_id:req.packId,type:pk.type,montant_paye:pk.prix};
      if(pk.type==='illimite'){insRow.seances_assistees=0;}else{insRow.seances_restantes=pk.seances;insRow.seances_total=pk.seances;}
      await sbInsert('inscriptions',insRow);
    }
    await fetch(SUPABASE_URL+'/rest/v1/demandes_inscription?id=eq.'+req.id,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+tok,'Prefer':'return=minimal'},
      body:JSON.stringify({statut:'validee'})
    });
  }
  if(s&&pk){
    var e={courseId:req.courseId,packId:req.packId,type:pk.type,paye:pk.prix};
    if(pk.type==='illimite'){e.assiste=0;}else{e.restant=pk.seances;e.total=pk.seances;}
    s.inscriptions.push(e);s.montant+=pk.prix;
  }
  var co=getCourse(req.courseId);
  if(co) co.inscrits=(co.inscrits||0)+1;
  INSCRIPTION_REQUESTS=INSCRIPTION_REQUESTS.filter(function(r){return r.id!==reqId;});
  toast('Inscription validée ✓');
  tPage('students');
}

}

RESERVATIONS_SEANCE=RESERVATIONS_SEANCE.filter(function(r){return r.id!==id;});

async function confirmRejectResa(id){
  var sel=document.querySelector('#mod-body .pack-option.selected');
  if(!sel){toast('Choisissez un motif','err');return;}
  var motif=sel.dataset.motif;
  if(motif==='Autre'){
    var txt=document.getElementById('motif-autre-txt');
    motif=txt&&txt.value.trim()?txt.value.trim():'Autre motif';
  }
  if(SUPABASE_READY){
    var tok=localStorage.getItem('RC_TOKEN')||SUPABASE_KEY;
    var r=await fetch(SUPABASE_URL+'/rest/v1/reservations_seance?id=eq.'+id,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+tok,'Prefer':'return=minimal'},
      body:JSON.stringify({statut:'refuse',note:motif})
    });
    if(!r.ok){var t=await r.text();toast('Erreur '+r.status+': '+t,'err');return;}
  }
  RESERVATIONS_SEANCE=RESERVATIONS_SEANCE.filter(function(r){return r.id!==id;});
  closeMod();
  toast('Réservation refusée — motif enregistré');
  tPage('students');
}

async function submitInsReq(courseIdx){
  var sp=document.querySelector('.pack-option.selected');if(!sp){toast('Choisissez un pack','err');return}
  var s=CURRENT_PROFILE||STUDENTS[LOGGED_STUDENT];
  if(!s){toast('Erreur profil','err');return;}
  if(s.inscriptions&&s.inscriptions.some(function(i){return i.courseId===COURSES[courseIdx].id})){toast('Déjà inscrit','err');closeMod();return}
  if(INSCRIPTION_REQUESTS.some(function(r){return r.studentId===s.id&&r.courseId===COURSES[courseIdx].id})){toast('Demande déjà envoyée','err');closeMod();return}
  var msg=document.getElementById('ins-msg');
  var row={eleve_id:s.id,cours_id:COURSES[courseIdx].id,pack_id:sp.dataset.pack,message:msg?msg.value:'',statut:'attente'};
  if(SUPABASE_READY){
    var res=await sbInsert('demandes_inscription',row);
    if(!res)return;
    INSCRIPTION_REQUESTS.push({id:res.id,studentId:s.id,courseId:COURSES[courseIdx].id,packId:sp.dataset.pack,date:new Date().toLocaleDateString('fr'),msg:msg?msg.value:''});
  }else{
    INSCRIPTION_REQUESTS.push({id:uid(),studentId:s.id,courseId:COURSES[courseIdx].id,packId:sp.dataset.pack,date:new Date().toLocaleDateString('fr'),msg:msg?msg.value:''});
  }
  closeMod();sPage('courses');toast('Demande envoyée !','info');
}

function getNextSession(cours){
  var today=new Date(); today.setHours(0,0,0,0);
  var todayStr=today.toISOString().split('T')[0];
  var months=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  var weekDays=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

  // Chercher dans les séances Supabase (dates réelles du prof)
  var seancesCours=SEANCES.filter(function(s){
    return s.cours_id===cours.id && s.date>=todayStr && s.statut!=='annule';
  });
  seancesCours.sort(function(a,b){return a.date.localeCompare(b.date);});

  if(seancesCours.length>0){
    var s=seancesCours[0];
    var d=new Date(s.date+'T12:00:00');
    var diff=Math.round((d-today)/(1000*60*60*24));
    return{date:d.getDate()+' '+months[d.getMonth()],jour:weekDays[d.getDay()],diff:diff,ds:s.date};
  }

  // Fallback: calcul automatique si aucune séance planifiée
  var days={'Lundi':1,'Mardi':2,'Mercredi':3,'Jeudi':4,'Vendredi':5,'Samedi':6,'Dimanche':0};
  var targetDay=days[cours.jour];
  if(targetDay===undefined) return null;
  var diff2=targetDay-today.getDay();
  if(diff2<0) diff2+=7;
  if(diff2===0&&cours.heure&&new Date().getHours()>=parseInt(cours.heure)) diff2+=7;
  var next=new Date(today);
  next.setDate(today.getDate()+diff2);
  return{date:next.getDate()+' '+months[next.getMonth()],jour:cours.jour,diff:diff2,ds:next.toISOString().split('T')[0]};
}

async function submitInscription(type){

  if(type==='pack'){
    var packId=sp.dataset.pack;

    if(SUPABASE_READY){
      var {error}=await sb.from('demandes_inscription').insert({
        eleve_id:CURRENT_USER.id,cours_id:co.id,pack_id:packId,
        statut:'attente',message:msg?msg.value:''

      if(error){toast('Erreur: '+error.message,'err');return;}
    }
    INSCRIPTION_REQUESTS.push({id:uid(),studentId:CURRENT_USER.id,courseId:co.id,packId:packId,date:new Date().toLocaleDateString('fr'),msg:msg?msg.value:''});
    closeMod();
    closeCoursDetail();

  } else if(type==='seance'){
    var seanceId=sp.dataset.pack;
    var dateVal=sp.dataset.date;
    var montant=co.tarif_seance||0;
    // Vérifier si l'élève a déjà une réservation active pour ce cours/cette date
    var dejaResa=RESERVATIONS_SEANCE.some(function(r){
      return r.eleve_id===CURRENT_USER.id&&r.cours_id===co.id&&
             (r.date===dateVal||r.statut==='attente'||r.statut==='confirme')&&
             r.statut!=='annule'&&r.statut!=='refuse';
    });
    if(dejaResa){toast('Vous avez déjà une réservation pour ce cours','err');closeMod();return;}
    if(SUPABASE_READY){

      var {data:existResa}=await sb.from('reservations_seance')
        .select('id').eq('eleve_id',CURRENT_USER.id).eq('cours_id',co.id)
        .not('statut','in','(annule,refuse)').limit(1);

        eleve_id:CURRENT_USER.id,cours_id:co.id,

      });

    }

      date:dateVal,montant:montant,statut:'attente'

function generateQR(elId,data){var el=document.getElementById(elId);if(!el)return;el.innerHTML='';try{new QRCode(el,{text:data,width:160,height:160,colorDark:'#07090F',colorLight:'#FFFFFF',correctLevel:QRCode.CorrectLevel.H})}catch(e){el.innerHTML='<div style="font-size:1.05rem;color:#999;word-break:break-all;padding:.3rem">'+data+'</div>'}}
var QR_STREAM=null;
var QR_SCANNING=false;
var QR_INTERVAL=null;

function openQR(){
  document.getElementById('qr-ov').classList.add('open');
  document.getElementById('qr-scan-view').style.display='flex';
  document.getElementById('qr-result').style.display='none';
  startCamera();
}

function closeQR(){
  document.getElementById('qr-ov').classList.remove('open');
  stopCamera();
}

function startCamera(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    toast('Caméra non disponible','err');return;
  }
  var video=document.getElementById('qr-video');
  if(!video)return;
  QR_SCANNING=true;
  // Toujours caméra arrière - essai strict d'abord, puis souple
  navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:'environment'}}})
  .catch(function(){
    return navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
  })
  .then(function(stream){
    QR_STREAM=stream;
    video.srcObject=stream;
    video.play().then(function(){
      function waitReady(){
        if(video.videoWidth>0){
          var st=document.getElementById('qr-status');
          if(st) st.textContent='Caméra active — pointez vers le QR code';
          startQRDetection(video);
        }else{setTimeout(waitReady,100);}
      }
      waitReady();
    });
  }).catch(function(e){
    console.warn('[RC] Camera error:',e);
    var st3=document.getElementById('qr-status');
    if(st3) st3.innerHTML='<span style="color:#E05555">Caméra inaccessible — vérifiez les permissions</span>';
    toast('Caméra inaccessible — vérifiez les permissions','err');
  });
}

function stopCamera(){
  QR_SCANNING=false;
  if(QR_INTERVAL){clearInterval(QR_INTERVAL);QR_INTERVAL=null;}
  if(QR_STREAM){QR_STREAM.getTracks().forEach(function(t){t.stop();});QR_STREAM=null;}
  var video=document.getElementById('qr-video');
  if(video){video.srcObject=null;}
}

function startQRDetection(video){
  var st0=document.getElementById('qr-status');
  // Méthode 1: BarcodeDetector API (natif Chrome Android/iOS 17+)
  if('BarcodeDetector' in window){
    var detector=new BarcodeDetector({formats:['qr_code']});
    if(st0) st0.textContent='Caméra active — pointez vers le QR code';
    console.log('[RC] BarcodeDetector disponible');
    QR_INTERVAL=setInterval(async function(){
      if(!QR_SCANNING||video.readyState<2||video.videoWidth===0) return;
      try{
        var codes=await detector.detect(video);
        if(codes&&codes.length>0){
          QR_SCANNING=false;
          clearInterval(QR_INTERVAL);
          console.log('[RC] QR détecté:',codes[0].rawValue);
          handleQRCode(codes[0].rawValue);
        }
      }catch(e){}
    },200);
    return;
  }
  // Méthode 2: Canvas + analyse manuelle (fallback basique)
  if(st0) st0.innerHTML='<span style="color:var(--gold)">BarcodeDetector non supporté sur cet appareil.<br>Essayez Chrome ou Safari récent.</span>';
  console.warn('[RC] BarcodeDetector non disponible');
}

async function handleQRCode(data){
  console.log('[RC] QR scanné:',data);
  // Format attendu: RC:STUDENT_ID:Prenom Nom
  var parts=data.split(':');
  var studentId=parts.length>=2?parts[1]:null;
  var student=null;
  // 1. Chercher dans STUDENTS chargés
  if(studentId){
    student=STUDENTS.find(function(s){return s.id===studentId;});
  }
  if(!student){
    student=STUDENTS.find(function(s){return data.indexOf(s.id)>=0;});
  }
  // 2. Si pas trouvé, charger depuis Supabase par ID
  if(!student && studentId && SUPABASE_READY){
    var {data:profData}=await sb.from('profiles').select('*').eq('id',studentId).single().catch(function(){return{data:null};});
    if(profData){
      var {data:insData}=await sb.from('inscriptions').select('*').eq('eleve_id',studentId).catch(function(){return{data:[]};});
      var ins=(insData||[]).map(function(i){return{courseId:i.cours_id,packId:i.pack_id,type:i.type,restant:i.seances_restantes,total:i.seances_total,assiste:i.seances_assistees||0,paye:parseFloat(i.montant_paye||0),dbId:i.id};});
      student={id:profData.id,nom:profData.nom,prenom:profData.prenom,email:profData.email,niveau:profData.niveau||'Débutant',photo:profData.photo_url,inscriptions:ins,st:'Actif',montant:ins.reduce(function(a,i){return a+i.paye;},0)};
      STUDENTS.push(student);
    }
  }
  stopCamera();
  if(student){
    showScannedStudent(STUDENTS.indexOf(student));
  }else{
    showUnknownQR(data);
  }
}

async function validateEntry(studentIdx,ci){
  var s=STUDENTS[studentIdx];
  if(!s)return;
  var ins=s.inscriptions[ci];if(!ins)return;
  var msg='';
  if(ins.type==='illimite'){
    ins.assiste=(ins.assiste||0)+1;
    msg='Illimite ('+ins.assiste+' séances ce cycle)';
  }else if(ins.restant>0){
    ins.restant--;
    msg=ins.restant+' séance'+(ins.restant!==1?'s':'')+' restante'+(ins.restant!==1?'s':'');
  }else{
    showValidationError('Aucune séance restante');return;
  }
  if(SUPABASE_READY){
    try{
      if(ins.dbId){
        if(ins.type==='illimite'){
          await sb.from('inscriptions').update({seances_assistees:ins.assiste}).eq('id',ins.dbId);
        }else{
          await sb.from('inscriptions').update({seances_restantes:ins.restant,seances_assistees:(ins.assiste||0)+1}).eq('id',ins.dbId);
        }
      }else{
        var {data:insData}=await sb.from('inscriptions').select('id').eq('eleve_id',s.id).eq('cours_id',ins.courseId).maybeSingle();
        if(insData){try{await sb.rpc('valider_entree',{p_inscription_id:insData.id});}catch(e){}}
      }
    }catch(e){console.warn('validateEntry:',e);}
  }
  showValidationSuccess(s,msg,ins);
}

async function refreshStudentInscriptions(studentId){
  // Recharge les inscriptions depuis Supabase pour l'eleve
  if(!SUPABASE_READY||!studentId) return;
  try{
    var {data:ins}=await sb.from('inscriptions').select('*').eq('eleve_id',studentId);
    if(!ins) return;
    var mapped=(ins||[]).map(function(i){return{courseId:i.cours_id,packId:i.pack_id,type:i.type,restant:i.seances_restantes,total:i.seances_total,assiste:i.seances_assistees||0,paye:parseFloat(i.montant_paye||0),dbId:i.id};});
    // Mettre à jour CURRENT_PROFILE si c'est l'élève connecté
    if(CURRENT_PROFILE&&CURRENT_PROFILE.id===studentId){
      CURRENT_PROFILE.inscriptions=mapped;
      CURRENT_PROFILE.montant=mapped.reduce(function(a,i){return a+i.paye;},0);
      var tr=mapped.reduce(function(a,i){return i.type==='illimite'?a:a+(i.restant||0);},0);
      CURRENT_PROFILE.tr=tr;
    }
    // Mettre à jour dans STUDENTS
    var si=STUDENTS.findIndex(function(st){return st.id===studentId;});
    if(si>=0){STUDENTS[si].inscriptions=mapped;}
  }catch(e){console.warn('refreshInscriptions:',e);}
}

async function loadSeances(){
  if(!SUPABASE_READY){tPage('courses');return;}
  toast('Chargement du calendrier...','info');
  var today=new Date(); today.setHours(0,0,0,0);
  var todayStr=today.toISOString().split('T')[0];
  var futur=new Date(today); futur.setDate(futur.getDate()+60);
  var futurStr=futur.toISOString().split('T')[0];

  // 1. Supprimer automatiquement les séances passées
  var tok=localStorage.getItem('RC_TOKEN')||SUPABASE_KEY;
  await fetch(SUPABASE_URL+'/rest/v1/seances?date=lt.'+todayStr,{
    method:'DELETE',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+tok,'Prefer':'return=minimal'}
  }).catch(function(){});

  // 2. Charger les séances existantes
  var {data}=await sb.from('seances').select('*')
    .gte('date',todayStr).lte('date',futurStr).order('date');
  SEANCES=data||[];

  // 3. Générer les dates manquantes
  await generateSeances();

  // 4. Recharger
  var {data:data2}=await sb.from('seances').select('*')
    .gte('date',todayStr).lte('date',futurStr).order('date');
  SEANCES=data2||[];
  tPage('courses');
}

async function addSeanceManuelle(coursId){
  // Ouvrir un sélecteur de date
  var input=document.createElement('input');
  input.type='date';
  input.style.cssText='position:fixed;opacity:0;top:0;left:0';
  var today=new Date().toISOString().split('T')[0];
  input.min=today;
  input.value=today;
  document.body.appendChild(input);
  input.focus();
  input.click();
  input.addEventListener('change',async function(){
    var ds=input.value;
    document.body.removeChild(input);
    if(!ds) return;
    // Vérifier si cette date existe déjà
    var exists=SEANCES.some(function(s){return s.cours_id===coursId&&s.date===ds;});
    if(exists){toast('Cette date existe déjà','err');return;}
    var {error}=await sb.from('seances').insert({cours_id:coursId,date:ds,statut:'actif'});
    if(error){toast('Erreur: '+error.message,'err');return;}
    toast('Séance ajoutée ✓');
    await loadSeances();
  });
  input.addEventListener('blur',function(){
    setTimeout(function(){if(document.body.contains(input))document.body.removeChild(input);},300);
  });
}

async function toggleSeance(id,currentStatut){
  var newStatut=currentStatut==='actif'?'annule':'actif';
  var tok=localStorage.getItem('RC_TOKEN')||SUPABASE_KEY;
  // Mettre à jour la séance
  await fetch(SUPABASE_URL+'/rest/v1/seances?id=eq.'+id,{
    method:'PATCH',
    headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+tok,'Prefer':'return=minimal'},
    body:JSON.stringify({statut:newStatut})
  });
  var s=SEANCES.find(function(x){return x.id===id;});
  if(s) s.statut=newStatut;
  // Si annulé : annuler toutes les réservations liées à cette séance
  if(newStatut==='annule'){
    var r=await fetch(SUPABASE_URL+'/rest/v1/reservations_seance?seance_id=eq.'+id+'&statut=in.(attente,confirme)',{
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+tok,'Prefer':'return=minimal'},
      body:JSON.stringify({statut:'annule',note:'Séance annulée par le professeur'})
    });
    if(r.ok) toast('Séance annulée — réservations associées annulées');
  }
  tPage('courses');
}

async function addSeanceNote(id){
  var note=prompt('Note pour cette séance (ex: "Annulé - vacances") :');
  if(note===null) return;
  await sb.from('seances').update({note:note}).eq('id',id);
  var s=SEANCES.find(function(x){return x.id===id;});
  if(s) s.note=note;
  tPage('courses');
}

async function deleteSeance(id){
  if(!confirm('Supprimer cette séance ?')) return;
  var {error}=await sb.from('seances').delete().eq('id',id);
  if(error){toast('Erreur: '+error.message,'err');return;}
  SEANCES=SEANCES.filter(function(s){return s.id!==id;});
  toast('Séance supprimée');
  tPage('courses');
}

// ── STUDENT PAGES ──
function sPage(p){
  ['feed','courses','profs','qr','profile'].forEach(function(x){var b=document.getElementById('sn-'+x);if(b)b.className='nb'+(x===p?' on':'')});
  var el=document.getElementById('s-page');
  var s=STUDENTS[LOGGED_STUDENT]||CURRENT_PROFILE||{};
  if(p==='feed')el.innerHTML=renderFeed(false);
  else if(p==='courses'){
    // S'assurer que s est à jour avec les inscriptions
    if(CURRENT_PROFILE&&CURRENT_PROFILE.id){
      s=CURRENT_PROFILE;
      // Synchroniser STUDENTS[0]
      if(!STUDENTS[0]||STUDENTS[0].id!==CURRENT_PROFILE.id) STUDENTS[0]=CURRENT_PROFILE;
    }
    el.innerHTML=renderSCourses(s);
    setTimeout(function(){
      el.querySelectorAll('[data-cid]').forEach(function(card){
        card.addEventListener('click',function(e){if(!e.target.closest('button'))openCoursDetail(this.dataset.cid);});
      });
    },0);
  }
  else if(p==='profs')el.innerHTML=renderSProfs();
  else if(p==='qr'){
    var qrStudent=CURRENT_PROFILE||s;
    el.innerHTML=renderSQR(qrStudent);
    setTimeout(function(){
      var qrId=qrStudent.id||(CURRENT_USER&&CURRENT_USER.id)||'unknown';
      generateQR('student-qr-box','RC:'+qrId+':'+qrStudent.prenom+' '+qrStudent.nom);
    },100);
  }
  else if(p==='profile')el.innerHTML=renderSProfile(s);
}

    '<div style="font-size:1.05rem;font-weight:600;margin-bottom:.2rem">'+s.prenom+' '+s.nom+'</div>'+
    '<div style="font-size:1rem;color:var(--muted);margin-bottom:.9rem">'+s.id+'</div>'+
    '<div>'+s.inscriptions.map(function(ins){var co=getCourse(ins.courseId);return'<span class="chip">'+co.jour+' · '+co.nom+'</span>'}).join('')+'</div>'+
    '<div style="margin-top:.9rem;padding:.65rem 1rem;background:var(--bg2);border-radius:8px;border:1px solid var(--border);display:inline-block;font-size:1.1rem;color:var(--muted2)">Séances restantes : <span style="color:var(--gold);font-weight:700">'+s.inscriptions.reduce(function(a,i){return i.type==='illimite'?a:a+(i.restant||0)},0)+'</span></div></div>';
}
function renderSProfile(s){
  var aH=s.photo?'<img src="'+s.photo+'" alt=""/>':ini(s);
  return'<div style="text-align:center;padding:1.5rem 0 1rem">'+
    '<div class="profile-av-big" style="margin:0 auto .9rem;width:72px;height:72px;font-size:1.5rem;'+(s.photo?'padding:0':'')+'">'+aH+'</div>'+
    '<div style="font-size:1.1rem;font-weight:700">'+s.prenom+' '+s.nom+'</div>'+
    '<div style="font-size:1.1rem;color:var(--muted);margin:.2rem 0">'+s.id+'</div>'+
    '<span class="badge '+(s.st==='Actif'?'bg-green':'bg-red')+'">'+s.st+'</span></div>'+
    '<div class="stat-grid"><div class="stat-box"><div class="stat-n">'+s.inscriptions.length+'</div><div class="stat-l">Cours</div></div><div class="stat-box"><div class="stat-n" style="color:var(--gold)">'+s.montant+' €</div><div class="stat-l">Réglé</div></div></div>'+
    '<div class="card">'+[['Email',s.email],['Téléphone',s.tel||'—'],['Naissance',s.dob||'—'],['Niveau',s.niveau]].map(function(r){return'<div class="info-row"><span class="info-label">'+r[0]+'</span><span style="font-size:1rem">'+r[1]+'</span></div>'}).join('')+'</div>'+
    '<button class="btn-add" style="width:100%;justify-content:center;padding:.65rem;font-size:1.1rem;margin-bottom:.6rem" onclick="openMod(\'editownprofile\')">✏ Modifier mes informations</button>'+
    '<button class="btn-primary" style="font-size:1.1rem;background:transparent;border:1px solid rgba(42,127,232,0.3);color:var(--accent);box-shadow:none" onclick="doLogout()">Se déconnecter</button>';
}
</script>
